<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mega WEB - Admin</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f3f4f6; margin:0; color:#111827; }
    .wrap { max-width: 900px; margin: 60px auto; padding: 0 16px; }
    .card { background:white; border-radius:16px; padding:24px; box-shadow:0 8px 20px rgba(0,0,0,0.06); }
    h1 { margin-top:0; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:16px; margin-top:24px; }
    a.box {
      display:block; text-decoration:none; color:#111827; background:#eff6ff; border:1px solid #bfdbfe;
      padding:20px; border-radius:14px; font-weight:700;
    }
    .muted { color:#6b7280; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>ADMIN PANEL</h1>
      <p class="muted">Probna verzija Mega WEB admin panela.</p>
      <div class="grid">
        <a class="box" href="./spisak-klijenata.html">Spisak klijenata</a>
        <a class="box" href="#">Tabele</a>
        <a class="box" href="#">Podešavanja</a>
      </div>
    </div>
  </div>
</body>
</html>
